name: skills-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      GH_CLI_VERSION: "2.90.0"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install GitHub CLI with skill support
        run: |
          arch="$(dpkg --print-architecture)"
          case "$arch" in
            amd64|arm64) ;;
            *) echo "Unsupported architecture for GitHub CLI install: $arch" >&2; exit 1 ;;
          esac
          curl -fsSL \
            -o /tmp/gh.deb \
            "https://github.com/cli/cli/releases/download/v${GH_CLI_VERSION}/gh_${GH_CLI_VERSION}_linux_${arch}.deb"
          sudo apt-get install -y --allow-downgrades /tmp/gh.deb
          gh --version
          gh skill --help

      - name: Install skill test dependencies
        run: python3 -m pip install --require-hashes -r skills/weex-trader-skill/requirements.lock

      - name: Verify checkout is clean for packaging
        run: python3 tools/clean_local_skill_checkout.py --check

      - name: Verify shared risk review core sync
        run: python3 tools/sync_weex_risk_review_core.py --check

      - name: Run skill tests
        run: python3 tools/run_skill_tests.py

      - name: Smoke local trader skill install
        run: python3 tools/install_local_skills.py --skill weex-trader-skill --agent codex --dir /tmp/weex-skill-install/trader --force

      - name: Smoke local analysis skill install
        run: python3 tools/install_local_skills.py --skill weex-analysis-skill --agent codex --dir /tmp/weex-skill-install/analysis --force

      - name: Smoke local monitor skill install
        run: python3 tools/install_local_skills.py --skill weex-monitor-skill --agent codex --dir /tmp/weex-skill-install/monitor --force

      - name: Re-clean checkout before publish validation
        run: python3 tools/clean_local_skill_checkout.py

      - name: Validate publish dry run
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh skill publish --dry-run
